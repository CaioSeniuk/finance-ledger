name: Prod Docker Release

on:
  pull_request:
    branches: [prod]
    types: [closed]

permissions:
  contents: read

concurrency:
  group: prod-docker-release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: finance-ledger
  IMAGE_REGISTRY: docker.io

jobs:
  quality-gate:
    name: Lint, Tests and Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: quality-gate

    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-
            type=raw,value=prod-${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set deploy image reference
        id: image-ref
        run: echo "value=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}

    steps:
      - name: Trigger deployment
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"$IMAGE_REF\",\"sha\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}"