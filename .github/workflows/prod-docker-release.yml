name: Prod Docker Release

on:
  pull_request:
    branches: [prod]
    types: [closed]

permissions:
  contents: read

concurrency:
  group: prod-docker-release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: finance-ledger
  IMAGE_REGISTRY: docker.io
  IMAGE_SHA_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
  IMAGE_LATEST_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
  IMAGE_RELEASE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:prod-${{ github.run_number }}

jobs:
  quality-gate:
    name: Lint, Tests and Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Generate audit report (for documentation)
        if: always()
        run: npm audit --json > npm-audit-report.json 2>&1 || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:typescript

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: quality-gate

    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_SHA_REF }}
            ${{ env.IMAGE_LATEST_REF }}
            ${{ env.IMAGE_RELEASE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_SHA_REF }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push image tags
        run: |
          docker push "${IMAGE_SHA_REF}"
          docker push "${IMAGE_LATEST_REF}"
          docker push "${IMAGE_RELEASE_REF}"

      - name: Image reference
        id: image-ref
        run: echo "value=${IMAGE_SHA_REF}" >> "$GITHUB_OUTPUT"